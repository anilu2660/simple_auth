<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AuthVault — Login &amp; Sign Up</title>
    <meta
      name="description"
      content="Secure and beautiful authentication portal. Create an account or sign in to access your dashboard."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="main.css" />
  </head>
  <body>
    <!-- Animated Canvas Background -->
    <canvas id="bgCanvas"></canvas>

    <!-- Floating Orbs -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <!-- Toast Container -->
    <div id="toastContainer" class="toast-container"></div>

    <!-- Main Auth Card -->
    <div class="auth-wrapper">
      <div class="auth-card" id="authCard">
        <!-- Logo / Brand -->
        <div class="brand">
          <div class="brand-icon">
            <svg
              width="28"
              height="28"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
          </div>
          <span class="brand-name">AuthVault</span>
        </div>

        <!-- Tab Switcher -->
        <div class="tab-switcher">
          <button
            class="tab-btn active"
            id="loginTab"
            onclick="switchTab('login')"
          >
            Login
          </button>
          <button class="tab-btn" id="signupTab" onclick="switchTab('signup')">
            Sign Up
          </button>
          <div class="tab-indicator" id="tabIndicator"></div>
        </div>

        <!-- Forms Container (slides) -->
        <div class="slider-viewport">
          <div class="forms-slider" id="formsSlider">
            <!-- ===== LOGIN FORM ===== -->
            <div class="form-panel" id="loginPanel">
              <h1 class="form-title">Welcome back</h1>
              <p class="form-subtitle">Sign in to your account to continue</p>

              <form id="loginForm" novalidate>
                <!-- Email -->
                <div class="input-group">
                  <div class="input-icon">
                    <svg
                      width="18"
                      height="18"
                      viewBox="0 0 24 24"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="2"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                    >
                      <path
                        d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"
                      ></path>
                      <polyline points="22,6 12,13 2,6"></polyline>
                    </svg>
                  </div>
                  <input
                    type="email"
                    id="loginEmail"
                    class="input-field"
                    placeholder=" "
                    autocomplete="email"
                    required
                  />
                  <label class="floating-label" for="loginEmail"
                    >Email address</label
                  >
                  <span class="input-error" id="loginEmailErr"></span>
                </div>

                <!-- Password -->
                <div class="input-group">
                  <div class="input-icon">
                    <svg
                      width="18"
                      height="18"
                      viewBox="0 0 24 24"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="2"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                    >
                      <rect x="3" y="11" width="18" height="11" rx="2"></rect>
                      <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                    </svg>
                  </div>
                  <input
                    type="password"
                    id="loginPassword"
                    class="input-field"
                    placeholder=" "
                    autocomplete="current-password"
                    required
                  />
                  <label class="floating-label" for="loginPassword"
                    >Password</label
                  >
                  <button
                    type="button"
                    class="toggle-pass"
                    onclick="togglePassword('loginPassword', this)"
                    aria-label="Show password"
                  >
                    <svg
                      class="eye-icon"
                      width="18"
                      height="18"
                      viewBox="0 0 24 24"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="2"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                    >
                      <path
                        d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"
                      ></path>
                      <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                  </button>
                  <span class="input-error" id="loginPassErr"></span>
                </div>

                <div class="form-meta">
                  <label class="remember-me">
                    <input type="checkbox" id="rememberMe" />
                    <span class="checkmark"></span>
                    Remember me
                  </label>
                  <a
                    href="#"
                    class="forgot-link"
                    onclick="showToast('Password reset coming soon!', 'info')"
                    >Forgot password?</a
                  >
                </div>

                <button type="submit" class="submit-btn" id="loginBtn">
                  <span class="btn-text">Sign In</span>
                  <div class="btn-spinner" id="loginSpinner"></div>
                  <svg
                    class="btn-arrow"
                    width="20"
                    height="20"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2.5"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  >
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                    <polyline points="12 5 19 12 12 19"></polyline>
                  </svg>
                </button>
              </form>

              <p class="form-switch-text">
                Don't have an account?
                <a href="#" onclick="switchTab('signup')">Create one →</a>
              </p>
            </div>

            <!-- ===== SIGNUP FORM ===== -->
            <div class="form-panel" id="signupPanel">
              <h1 class="form-title">Create account</h1>
              <p class="form-subtitle">Join us today — it's free forever</p>

              <form id="signupForm" novalidate>
                <!-- Name -->
                <div class="input-group">
                  <div class="input-icon">
                    <svg
                      width="18"
                      height="18"
                      viewBox="0 0 24 24"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="2"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                    >
                      <path
                        d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"
                      ></path>
                      <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                  </div>
                  <input
                    type="text"
                    id="signupName"
                    class="input-field"
                    placeholder=" "
                    autocomplete="name"
                    required
                  />
                  <label class="floating-label" for="signupName"
                    >Full name</label
                  >
                  <span class="input-error" id="signupNameErr"></span>
                </div>

                <!-- Email -->
                <div class="input-group">
                  <div class="input-icon">
                    <svg
                      width="18"
                      height="18"
                      viewBox="0 0 24 24"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="2"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                    >
                      <path
                        d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"
                      ></path>
                      <polyline points="22,6 12,13 2,6"></polyline>
                    </svg>
                  </div>
                  <input
                    type="email"
                    id="signupEmail"
                    class="input-field"
                    placeholder=" "
                    autocomplete="email"
                    required
                  />
                  <label class="floating-label" for="signupEmail"
                    >Email address</label
                  >
                  <span class="input-error" id="signupEmailErr"></span>
                </div>

                <!-- Password -->
                <div class="input-group">
                  <div class="input-icon">
                    <svg
                      width="18"
                      height="18"
                      viewBox="0 0 24 24"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="2"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                    >
                      <rect x="3" y="11" width="18" height="11" rx="2"></rect>
                      <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                    </svg>
                  </div>
                  <input
                    type="password"
                    id="signupPassword"
                    class="input-field"
                    placeholder=" "
                    autocomplete="new-password"
                    required
                  />
                  <label class="floating-label" for="signupPassword"
                    >Password</label
                  >
                  <button
                    type="button"
                    class="toggle-pass"
                    onclick="togglePassword('signupPassword', this)"
                    aria-label="Show password"
                  >
                    <svg
                      class="eye-icon"
                      width="18"
                      height="18"
                      viewBox="0 0 24 24"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="2"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                    >
                      <path
                        d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"
                      ></path>
                      <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                  </button>
                  <span class="input-error" id="signupPassErr"></span>
                </div>

                <!-- Password Strength -->
                <div class="strength-bar-wrap" id="strengthWrap">
                  <div class="strength-bar" id="strengthBar"></div>
                </div>
                <p class="strength-label" id="strengthLabel"></p>

                <!-- Confirm Password -->
                <div class="input-group">
                  <div class="input-icon">
                    <svg
                      width="18"
                      height="18"
                      viewBox="0 0 24 24"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="2"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                    >
                      <path
                        d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0 1 12 2.944a11.955 11.955 0 0 1-8.618 3.04A12.02 12.02 0 0 0 3 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"
                      ></path>
                    </svg>
                  </div>
                  <input
                    type="password"
                    id="signupConfirm"
                    class="input-field"
                    placeholder=" "
                    autocomplete="new-password"
                    required
                  />
                  <label class="floating-label" for="signupConfirm"
                    >Confirm password</label
                  >
                  <span class="input-error" id="signupConfirmErr"></span>
                </div>

                <!-- Two-column row: Gender + Age -->
                <div class="input-row">
                  <!-- Gender -->
                  <div class="input-group">
                    <div class="input-icon">
                      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2m0 16v2M4.93 4.93l1.41 1.41m11.32 11.32 1.41 1.41M2 12h2m16 0h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
                    </div>
                    <select id="signupGender" class="input-field select-field">
                      <option value="" disabled selected hidden></option>
                      <option value="Male">Male</option>
                      <option value="Female">Female</option>
                      <option value="Other">Other</option>
                      <option value="Prefer not to say">Prefer not to say</option>
                    </select>
                    <label class="floating-label select-label" for="signupGender">Gender</label>
                  </div>

                  <!-- Age -->
                  <div class="input-group">
                    <div class="input-icon">
                      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                    </div>
                    <input type="number" id="signupAge" class="input-field" placeholder=" " min="1" max="120" />
                    <label class="floating-label" for="signupAge">Age</label>
                    <span class="input-error" id="signupAgeErr"></span>
                  </div>
                </div>

                <!-- City -->
                <div class="input-group">
                  <div class="input-icon">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                  </div>
                  <input type="text" id="signupCity" class="input-field" placeholder=" " autocomplete="address-level2" />
                  <label class="floating-label" for="signupCity">City</label>
                </div>

                <!-- Mobile -->
                <div class="input-group">
                  <div class="input-icon">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>
                  </div>
                  <input type="tel" id="signupMobile" class="input-field" placeholder=" " autocomplete="tel" maxlength="10" />
                  <label class="floating-label" for="signupMobile">Mobile number (10 digits)</label>
                  <span class="input-error" id="signupMobileErr"></span>
                </div>

                <div class="terms-check">
                  <label class="remember-me">
                    <input type="checkbox" id="termsCheck" required />
                    <span class="checkmark"></span>
                    I agree to the
                    <a
                      href="#"
                      onclick="showToast('Terms coming soon!', 'info')"
                      >Terms &amp; Privacy</a
                    >
                  </label>
                </div>

                <button type="submit" class="submit-btn" id="signupBtn">
                  <span class="btn-text">Create Account</span>
                  <div class="btn-spinner" id="signupSpinner"></div>
                  <svg
                    class="btn-arrow"
                    width="20"
                    height="20"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2.5"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  >
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                    <polyline points="12 5 19 12 12 19"></polyline>
                  </svg>
                </button>
              </form>

              <p class="form-switch-text">
                Already have an account?
                <a href="#" onclick="switchTab('login')">Sign in →</a>
              </p>
            </div>
          </div>
          <!-- /forms-slider -->
        </div>
        <!-- /slider-viewport -->
      </div>
      <!-- /auth-card -->

      <!-- Decorative text -->
      <p class="footer-tagline">
        Secured with 256-bit encryption &amp; bcrypt hashing
      </p>
    </div>
    <!-- /auth-wrapper -->

    <script src="main.js"></script>
  </body>
</html>
